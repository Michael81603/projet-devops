{% extends 'base.html' %}

{% block title %}Ajouter une ressource — EduRessources{% endblock %}

{% block content %}
<div class="section-page">

    <a href="{{ url_for('dashboard') }}" class="back-link">
        <svg class="icon icon-sm" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M19 12H5"></path>
            <path d="m12 19-7-7 7-7"></path>
        </svg>
        Retour au tableau de bord
    </a>

    <div class="card">
        <div class="card-title">
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 5v14"></path>
                <path d="M5 12h14"></path>
            </svg>
            Ajouter une ressource
        </div>

        <form method="POST" action="{{ url_for('ajouter_ressource') }}">
            <div class="form-group">
                <label for="titre">Titre de la ressource</label>
                <input type="text" id="titre" name="titre" placeholder="Ex: Cours chapitre 1 - Algorithmique" required>
            </div>
            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" name="description" rows="3" placeholder="Décrivez brièvement cette ressource..."></textarea>
            </div>
            <div class="form-group">
                <label for="lien">Lien (URL)</label>
                <input type="url" id="lien" name="lien" placeholder="https://drive.google.com/...">
                <p class="field-help">Ajoutez un lien consultable par les étudiants si la ressource est en ligne.</p>
            </div>
            <div class="form-group">
                <label for="type_ressource">Type de ressource</label>
                <select id="type_ressource" name="type_ressource">
                    <option value="cours">Cours</option>
                    <option value="exercice">Exercice</option>
                    <option value="correction">Correction</option>
                    <option value="video">Vidéo</option>
                    <option value="autre">Autre</option>
                </select>
            </div>
            <div class="form-group">
                <label for="matiere_id">Matière</label>
                <select id="matiere_id" name="matiere_id" required>
                    <option value="">-- Choisir une matière --</option>
                    {% for matiere in matieres %}
                    <option value="{{ matiere.id }}">{{ matiere.nom }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Ajouter la ressource</button>
                <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">Annuler</a>
            </div>
        </form>
    </div>

</div>
{% endblock %}
